{% extends 'base.html' %}
{% load static %}
{% block content %}
<html>
<head>
    <title>Login</title>
</head>
<body>
<h2>Login</h2>

<form method="post">
    {% csrf_token %}
    <input type="email" name="email" placeholder="Email" required><br>
    <input type="password" name="password" placeholder="Password" required><br>
    <button type="submit">Login</button>
</form>

</body>
</html>

{% endblock %}
