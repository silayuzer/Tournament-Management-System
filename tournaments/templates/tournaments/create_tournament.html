{% extends 'base.html' %}
{% load static %}
{% block title %}Create Tournament{% endblock %}
{% block content %}

<div class="container" style="max-width: 640px;">
    <div class="card">
        <div class="card-header gradient">
            <h2 style="font-size:1.4rem; font-weight:700;">🏆 Create Tournament</h2>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label>Tournament Name</label>
                    <input type="text" name="name" class="form-control" placeholder="Enter tournament name" required>
                </div>

                <div class="form-group">
                    <label>Discipline</label>
                    <select name="discipline" id="id_discipline" class="form-control" required>
                        <option value="">Select a discipline</option>
                        <option value="SOCCER">⚽ Soccer</option>
                        <option value="TENNIS">🎾 Tennis</option>
                        <option value="CHESS">♟ Chess</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" class="form-control" placeholder="Enter tournament description (optional)"></textarea>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="datetime-local" name="start_time" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Application Deadline</label>
                        <input type="datetime-local" name="application_deadline" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <input type="text" name="location" class="form-control" placeholder="Enter tournament location" required>
                </div>

                <div class="form-group" id="field_max_teams" style="display: none;">
                    <label>Max Teams</label>
                    <input type="number" name="max_teams" class="form-control" placeholder="Enter maximum teams">
                </div>

                <div class="form-group" id="field_max_participants" style="display: none;"> 
                    <label>Max Participants</label>
                    <input type="number" name="max_participants" class="form-control" placeholder="Enter maximum participants">
                </div>

                <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:1.25rem;">
                    <input type="checkbox" name="is_active" id="id_is_active" checked style="width:16px; height:16px;">
                    <label for="id_is_active" style="margin:0; font-size:0.875rem;">Active</label>
                </div>

                <div style="display:flex; gap:0.75rem;">
                    <button type="submit" class="btn btn-gradient btn-lg" style="flex: 1;">Create Tournament</button>
                    <a href="/" class="btn" style="background:#f1f5f9; color:#475569; padding: 0.75rem 1.5rem;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>    

<script>
    const discipline = document.getElementById('id_discipline');
    const teamField = document.getElementById('field_max_teams');
    const participantField = document.getElementById('field_max_participants');

    function updateFields() {
        const val = discipline.value;
        teamField.style.display = val === 'SOCCER' ? 'block' : 'none';
        participantField.style.display = (val === 'TENNIS' || val === 'CHESS') ? 'block' : 'none';
    }
    
    discipline.addEventListener('change', updateFields);
    updateFields();
</script>
{% endblock %}
