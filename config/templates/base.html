{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tournament System{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="/" class="nav-brand">Home</a>
    </div>

    <div class="nav-right">
        {% if user.is_authenticated %}
            <span class="nav-user">
                Welcome, {{ user.first_name|default:user.email }}
            </span>

            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn">Logout</button>
            </form>


            {% if user.is_staff %}
                <a href="/admin/" class="btn admin">
                    Admin Panel
                </a>
            {% endif %}
        {% else %}
            <a href="{% url 'accounts:login' %}" class="btn">
                Login
            </a>

            <a href="{% url 'accounts:register' %}" class="btn primary">
                Register
            </a>
        {% endif %}
    </div>
</nav>


<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
